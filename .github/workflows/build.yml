on:
  workflow_call:
    inputs:
      platform:
        description: platform
        required: true
        type: string
jobs:
  build:
    runs-on: |
      ${{ fromJSON('{
        "windows.amd64": "windows-2025-vs2026",
        "linux.amd64": "ubuntu-latest",
        "macintosh.arm64": "macos-latest",
        "android.arm64": "macos-latest",
        "iphone.arm64": "macos-latest"
      }')[inputs.platform] }}
    env:
      repository_name: KairosoftGameManager
      repository_path: ${{ github.workspace }}/KairosoftGameManager
      repository_url: https://github.com/twinstar6980/KairosoftGameManager
    steps:
      - name: check out
        uses: actions/checkout@v4
      - name: setup python
        uses: ./.github/actions/setup_python
        with:
          platform: ${{ inputs.platform }}
          version: '3.14.3'
      - name: setup windows-sdk
        if: inputs.platform == 'windows.amd64'
        uses: ./.github/actions/setup_windowssdk
        with:
          platform: ${{ inputs.platform }}
          version: '26100'
      # - name: setup android-sdk
      #   if: inputs.platform == 'android.arm64'
      #   uses: ./.github/actions/setup_androidsdk
      #   with:
      #     platform: ${{ inputs.platform }}
      #     version: '36.1'
      #     build_version: '36.1.0'
      #     ndk_version: '29.0.14206865'
      # - name: setup llvm
      #   uses: ./.github/actions/setup_llvm
      #   with:
      #     platform: ${{ inputs.platform }}
      #     version: '21'
      #     windows_version: '20251216'
      # - name: setup xmake
      #   uses: ./.github/actions/setup_xmake
      #   with:
      #     platform: ${{ inputs.platform }}
      #     version: '3.0.7'
      # - name: setup typescript
      #   uses: ./.github/actions/setup_typescript
      #   with:
      #     platform: ${{ inputs.platform }}
      #     version: '5.9.3'
      # - name: setup flutter
      #   uses: ./.github/actions/setup_flutter
      #   with:
      #     platform: ${{ inputs.platform }}
      #     version: '3.41.4'
      - name: setup msbuild
        if: inputs.platform == 'windows.amd64'
        uses: ./.github/actions/setup_msbuild
        with:
          platform: ${{ inputs.platform }}
          version: '18.3.0'
      - name: clone
        shell: pwsh
        run: |
          git clone "${{ env.repository_url }}"
          echo "${{ secrets.CERTIFICATE_PASSWORD_PFX }}".Length
        env:
          CERTIFICATE_PASSWORD_PFX: ${{ secrets.CERTIFICATE_PASSWORD_PFX }}
      - name: download certificate
        uses: ./.github/actions/download_certificate
        with:
          source_file_pfx: ${{ secrets.CERTIFICATE_FILE_PFX }}
          source_password_pfx: ${{ secrets.CERTIFICATE_PASSWORD_PFX }}
          source_file_jks: ${{ secrets.CERTIFICATE_FILE_JKS }}
          source_password_jks: ${{ secrets.CERTIFICATE_PASSWORD_JKS }}
          destination: ${{ env.repository_path }}/.local/certificate
      - name: build
        shell: pwsh
        run: |
          python3 "${{ env.repository_path }}/DISTRIBUTE.py" "${{ inputs.platform }}"
      - name: upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.platform }}.zip
          path: |
            ${{ env.repository_path }}/.local/distribution
