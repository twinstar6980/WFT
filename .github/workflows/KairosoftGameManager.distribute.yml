name: KairosoftGameManager - distribute
on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      platform:
        required: true
        type: string
    secrets:
      certificate_file_pfx:
        required: false
      certificate_password_pfx:
        required: false
      certificate_file_jks:
        required: false
      certificate_password_jks:
        required: false
      webdav_endpoint:
        required: false
      webdav_username:
        required: false
      webdav_password:
        required: false
env:
  host: |-
    ${{ fromJSON('{
      "windows.amd64": "windows",
    }')[inputs.platform] }}
  certificate_available: |-
    ${{ true
      && secrets.certificate_file_pfx != ''
      && secrets.certificate_password_pfx != ''
      && secrets.certificate_file_jks != ''
      && secrets.certificate_password_jks != ''
    }}
  webdav_available: |-
    ${{ true
      && secrets.webdav_endpoint != ''
      && secrets.webdav_username != ''
      && secrets.webdav_password != ''
    }}
jobs:
  main:
    runs-on: |-
      ${{ fromJSON('{
        "windows.amd64": "windows-2025-vs2026",
      }')[inputs.platform] }}
    steps:
      - name: check out
        if: ${{ true }}
        uses: actions/checkout@v4
      - name: setup python
        if: ${{ inputs.platform == 'windows.amd64' }}
        uses: ./.github/actions/setup_python
        with:
          host: ${{ env.host }}
          version: '3.14.3'
      - name: setup windows-sdk
        if: ${{ inputs.platform == 'windows.amd64' }}
        uses: ./.github/actions/setup_windowssdk
        with:
          host: ${{ env.host }}
          version: '26100'
      - name: setup msbuild
        if: ${{ inputs.platform == 'windows.amd64' }}
        uses: ./.github/actions/setup_msbuild
        with:
          host: ${{ env.host }}
          version: '18.3.0'
      - name: clone repository
        if: ${{ true }}
        shell: pwsh
        run: |
          git clone "${{ inputs.repository }}" "${{ github.workspace }}/repository"
      - name: download certificate
        if: ${{ fromJSON(env.certificate_available) }}
        uses: ./.github/actions/download_certificate
        with:
          source_file_pfx: ${{ secrets.certificate_file_pfx }}
          source_password_pfx: ${{ secrets.certificate_password_pfx }}
          source_file_jks: ${{ secrets.certificate_file_jks }}
          source_password_jks: ${{ secrets.certificate_password_jks }}
          destination: ${{ github.workspace }}/repository/.local/certificate
      - name: build repository
        if: ${{ true }}
        shell: pwsh
        run: |
          python3 "${{ github.workspace }}/repository/BUILD.py" "${{ inputs.platform }}"
      - name: upload to webdav
        if: ${{ fromJSON(env.webdav_available) }}
        uses: ./.github/actions/upload_file
        with:
          path: ${{ github.workspace }}/repository/.local/distribution/*
          target: webdav
          webdav_endpoint: ${{ secrets.webdav_endpoint }}
          webdav_username: ${{ secrets.webdav_username }}
          webdav_password: ${{ secrets.webdav_password }}
          webdav_destination: '/ghatest'
      - name: upload to action
        if: ${{ true }}
        uses: ./.github/actions/upload_file
        with:
          enss: false
          path: ${{ github.workspace }}/repository/.local/distribution/*
          target: action
          action_destination: ${{ inputs.platform }}.distribution
