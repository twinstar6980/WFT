on:
  workflow_dispatch:
    inputs:
      platform_windows_amd64:
        description: platform_windows_amd64
        required: true
        type: boolean
        default: false
      platform_linux_amd64:
        description: platform_linux_amd64
        required: true
        type: boolean
        default: false
      platform_macintosh_arm64:
        description: platform_macintosh_arm64
        required: true
        type: boolean
        default: false
      platform_android_arm64:
        description: platform_android_arm64
        required: true
        type: boolean
        default: false
      platform_iphone_arm64:
        description: platform_iphone_arm64
        required: true
        type: boolean
        default: false
jobs:
  build:
    strategy:
      matrix:
        include:
          - name: windows.amd64
            enabled: ${{ inputs.platform_windows_amd64 }}
          - name: linux.amd64
            enabled: ${{ inputs.platform_linux_amd64 }}
          - name: macintosh.arm64
            enabled: ${{ inputs.platform_macintosh_arm64 }}
          - name: android.arm64
            enabled: ${{ inputs.platform_android_arm64 }}
          - name: iphone.arm64
            enabled: ${{ inputs.platform_iphone_arm64 }}
    if: ${{ inputs.enabled }}
    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.name }}
    secrets: inherit
