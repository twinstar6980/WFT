name: Twinning
on:
  workflow_dispatch:
    inputs:
      repository_url:
        required: true
        type: string
        default: 'https://github.com/twinstar6980/Twinning'
      distribute_windows_amd64:
        required: true
        type: boolean
        default: false
      distribute_linux_amd64:
        required: true
        type: boolean
        default: false
      distribute_macintosh_arm64:
        required: true
        type: boolean
        default: false
      distribute_android_arm64:
        required: true
        type: boolean
        default: false
      distribute_iphone_arm64:
        required: true
        type: boolean
        default: false
jobs:
  distribute_windows_amd64:
    if: ${{ inputs.distribute_windows_amd64 }}
    uses: ./.github/workflows/Twinning.distribute.yml
    with:
      platform: windows.amd64
    secrets: inherit
  distribute_linux_amd64:
    if: ${{ inputs.distribute_linux_amd64 }}
    uses: ./.github/workflows/Twinning.distribute.yml
    with:
      platform: linux.amd64
    secrets: inherit
  distribute_macintosh_arm64:
    if: ${{ inputs.distribute_macintosh_arm64 }}
    uses: ./.github/workflows/Twinning.distribute.yml
    with:
      platform: macintosh.arm64
    secrets: inherit
  distribute_android_arm64:
    if: ${{ inputs.distribute_android_arm64 }}
    uses: ./.github/workflows/Twinning.distribute.yml
    with:
      platform: android.arm64
    secrets: inherit
  distribute_iphone_arm64:
    if: ${{ inputs.distribute_iphone_arm64 }}
    uses: ./.github/workflows/Twinning.distribute.yml
    with:
      platform: iphone.arm64
    secrets: inherit
