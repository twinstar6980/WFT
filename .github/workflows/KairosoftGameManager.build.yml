name: KairosoftGameManager - build
on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
    secrets:
      certificate_file_pfx:
        required: false
      certificate_password_pfx:
        required: false
      certificate_file_jks:
        required: false
      certificate_password_jks:
        required: false
env:
  host: |-
    ${{ fromJSON('{
      "windows.amd64": "windows",
    }')[inputs.platform] }}
jobs:
  build:
    runs-on: |-
      ${{ fromJSON('{
        "windows.amd64": "windows-2025-vs2026",
      }')[inputs.platform] }}
    env:
      repository_name: KairosoftGameManager
      repository_path: ${{ github.workspace }}/KairosoftGameManager
      repository_url: https://github.com/twinstar6980/KairosoftGameManager
      certificate_available: ${{ secrets.certificate_file_pfx != '' && secrets.certificate_password_pfx != '' && secrets.certificate_file_jks != '' && secrets.certificate_password_jks != '' }}
    steps:
      - name: check out
        uses: actions/checkout@v4
      - name: setup python
        if: ${{ inputs.platform == 'windows.amd64' }}
        uses: ./.github/actions/setup_python
        with:
          host: ${{ env.host }}
          version: '3.14.3'
      - name: setup windows-sdk
        if: ${{ inputs.platform == 'windows.amd64' }}
        uses: ./.github/actions/setup_windowssdk
        with:
          host: ${{ env.host }}
          version: '26100'
      - name: setup msbuild
        if: ${{ inputs.platform == 'windows.amd64' }}
        uses: ./.github/actions/setup_msbuild
        with:
          host: ${{ env.host }}
          version: '18.3.0'
      - name: clone
        shell: pwsh
        run: |
          git clone "${{ env.repository_url }}"
      - name: download certificate
        if: ${{ env.certificate_available }}
        uses: ./.github/actions/download_certificate
        with:
          source_file_pfx: ${{ secrets.certificate_file_pfx }}
          source_password_pfx: ${{ secrets.certificate_password_pfx }}
          source_file_jks: ${{ secrets.certificate_file_jks }}
          source_password_jks: ${{ secrets.certificate_password_jks }}
          destination: ${{ env.repository_path }}/.local/certificate
      - name: build
        shell: pwsh
        run: |
          python3 "${{ env.repository_path }}/BUILD.py" "${{ inputs.platform }}"
      - name: upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.platform }}.distribution
          path: |
            ${{ env.repository_path }}/.local/distribution/*
