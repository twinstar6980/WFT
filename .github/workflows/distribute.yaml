name: distribute
on:
  workflow_dispatch:
    inputs:
      target:
        description: target platform
        required: true
        type: choice
        options:
          - windows.amd64
jobs:
  build:
    strategy:
      matrix:
        include:
          - target_platform: windows.amd64
            github_os: windows-2025-vs2026
            repository_name: KairosoftGameManager
            repository_path: ./KairosoftGameManager
            repository_url: https://github.com/twinstar6980/KairosoftGameManager
    runs-on: ${{matrix.github_os}}
    steps:
      - name: chech out
        uses: actions/checkout@v4
      - name: prepare MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[18.0,'
          msbuild-architecture: x64
      - name: prepare Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
      - name: prepare Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.x
      - name: test
        shell: bash
        run: |
          flutter doctor -v
          tsc --version
      - name: clone
        shell: bash
        run: |
          git clone ${{matrix.repository_url}}
      # - name: restore certificate
      #   shell: bash
      #   run: |
      #     mkdir ${{matrix.repository_path}}/.local
      #     mkdir ${{matrix.repository_path}}/.local/certificate
      #     echo -n "${{ secrets.CERTIFICATE_FILE_PFX     }}" | base64 -d > ${{matrix.repository_path}}/.local/certificate/file.pfx
      #     echo -n "${{ secrets.CERTIFICATE_PASSWORD_PFX }}" | base64 -d > ${{matrix.repository_path}}/.local/certificate/password.pfx.txt
      #     echo -n "${{ secrets.CERTIFICATE_FILE_JKS     }}" | base64 -d > ${{matrix.repository_path}}/.local/certificate/file.jks
      #     echo -n "${{ secrets.CERTIFICATE_PASSWORD_JKS }}" | base64 -d > ${{matrix.repository_path}}/.local/certificate/password.jks.txt
      # - name: distribute
      #   shell: bash
      #   run: |
      #     cd ${{matrix.repository_path}}
      #     python3 ./DISTRIBUTE.py ${{matrix.target_platform}}
      - name: upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{matrix.target_platform}}.zip
          path: |
            ${{matrix.repository_path}}/.local/distribution
