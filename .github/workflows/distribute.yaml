name: distribute
on:
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        include:
          - target_platform: windows.amd64
            github_os: windows-2025-vs2026
    runs-on: ${{ matrix.github_os }}
    steps:
      - name: chech out
        uses: actions/checkout@v4
      - name: prepare MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[18.0,'
          msbuild-architecture: x64
      - name: clone
        shell: bash
        run: |
          git clone https://github.com/twinstar6980/KairosoftGameManager
      - name: restore certificate
        shell: bash
        run: |
          mkdir ./KairosoftGameManager/.local
          mkdir ./KairosoftGameManager/.local/certificate
          echo -n "${{ secrets.CERTIFICATE_FILE_PFX     }}" | base64 -d > ./KairosoftGameManager/.local/certificate/file.pfx
          echo -n "${{ secrets.CERTIFICATE_PASSWORD_PFX }}" | base64 -d > ./KairosoftGameManager/.local/certificate/password.pfx.txt
          echo -n "${{ secrets.CERTIFICATE_FILE_JKS     }}" | base64 -d > ./KairosoftGameManager/.local/certificate/file.jks
          echo -n "${{ secrets.CERTIFICATE_PASSWORD_JKS }}" | base64 -d > ./KairosoftGameManager/.local/certificate/password.jks.txt
      - name: distribute
        run: |
          cd ./KairosoftGameManager
          python3 ./DISTRIBUTE.py ${{ matrix.target_platform }}
      - name: upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target_platform }}.zip
          path: |
            ./KairosoftGameManager/.local/distribution
