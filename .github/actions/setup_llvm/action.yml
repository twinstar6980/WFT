inputs:
  host:
    description: host
    required: true
  version:
    description: version
    required: true
  windows_version:
    description: windows_version
    required: true
runs:
  using: composite
  steps:
    - name: install
      if: ${{ inputs.host == 'windows' }}
      shell: pwsh
      run: |
        winget install --id "MartinStorsjo.LLVM-MinGW.UCRT" --version "${{ inputs.windows_version }}" --source winget --exact --silent --accept-source-agreements --disable-interactivity
    - name: install
      if: ${{ inputs.host == 'linux' }}
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/.local/development"
        Invoke-WebRequest -Uri "https://apt.llvm.org/llvm.sh" -OutFile "${{ github.workspace }}/.local/development/llvm.sh"
        chmod +x "${{ github.workspace }}/.local/development/llvm.sh"
        sudo "${{ github.workspace }}/.local/development/llvm.sh" "${{ inputs.version }}" all
        Remove-Item "${{ github.workspace }}/.local/development/llvm.sh"
        Add-Content -Encoding utf8 -Path $env:GITHUB_PATH -Value "/usr/lib/llvm-${{ inputs.version }}/bin"
    - name: install
      if: ${{ inputs.host == 'macintosh' }}
      shell: pwsh
      run: |
        brew install llvm@${{ inputs.version }}
        Add-Content -Encoding utf8 -Path $env:GITHUB_PATH -Value "/opt/homebrew/opt/llvm@${{ inputs.version }}/bin"
    - name: check
      if: ${{ inputs.host == 'windows' || inputs.host == 'linux' || inputs.host == 'macintosh' }}
      shell: pwsh
      run: |
        echo $env:PATH
        dir "$env:LOCALAPPDATA\Microsoft\WinGet\Links"
        dir "$env:LOCALAPPDATA\Microsoft\WinGet\Packages\MartinStorsjo.LLVM-MinGW.UCRT_Microsoft.Winget.Source_8wekyb3d8bbwe\llvm-mingw-20251216-ucrt-x86_64"
        clang --version
        llvm-strip --version
