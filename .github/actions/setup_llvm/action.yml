inputs:
  host:
    description: host
    required: true
  version:
    description: version
    required: true
  windows_version:
    description: windows_version
    required: true
runs:
  using: composite
  steps:
    - name: install
      if: inputs.host == 'windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/.local/development"
        Invoke-WebRequest -Uri "https://github.com/mstorsjo/llvm-mingw/releases/download/${{ inputs.windows_version }}/llvm-mingw-${{ inputs.windows_version }}-ucrt-x86_64.zip" -OutFile "${{ github.workspace }}/.local/development/llvm-mingw.zip"
        Expand-Archive -Force -Path "${{ github.workspace }}/.local/development/llvm-mingw.zip" -DestinationPath "${{ github.workspace }}/.local/development"
        Remove-Item "${{ github.workspace }}/.local/development/llvm-mingw.zip"
        Add-Content -Encoding utf8 -Path $env:GITHUB_PATH -Value "${{ github.workspace }}/.local/development/llvm-mingw-${{ inputs.windows_version }}-ucrt-x86_64/bin"
    - name: install
      if: inputs.host == 'linux'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/.local/development"
        Invoke-WebRequest -Uri "https://apt.llvm.org/llvm.sh" -OutFile "${{ github.workspace }}/.local/development/llvm.sh"
        chmod +x "${{ github.workspace }}/.local/development/llvm.sh"
        sudo "${{ github.workspace }}/.local/development/llvm.sh" "${{ inputs.version }}" all
        Remove-Item "${{ github.workspace }}/.local/development/llvm.sh"
        Add-Content -Encoding utf8 -Path $env:GITHUB_PATH -Value "/usr/lib/llvm-${{ inputs.version }}/bin"
    - name: install
      if: inputs.host == 'macintosh'
      shell: pwsh
      run: |
        brew install llvm@${{ inputs.version }}
        Add-Content -Encoding utf8 -Path $env:GITHUB_PATH -Value "/opt/homebrew/opt/llvm@${{ inputs.version }}/bin"
    - name: check
      if: inputs.host == 'windows' || inputs.host == 'linux' || inputs.host == 'macintosh'
      shell: pwsh
      run: |
        clang --version
        llvm-strip --version
