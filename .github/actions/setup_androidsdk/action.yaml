inputs:
  platform:
    description: platform
    required: true
  version:
    description: version
    required: true
runs:
  using: composite
  steps:
    - id: check
      shell: pwsh
      run: |
        Add-Content -Encoding utf8 -Path $env:GITHUB_PATH -Value "$env:ANDROID_HOME/cmdline-tools/latest/bin"
        Get-Content -Path $env:GITHUB_PATH
        echo $env:PATH
    - id: check
      shell: pwsh
      run: |
        echo $env:ANDROID_HOME
        echo $env:PATH
        sdkmanager --version
        sdkmanager --install cmdline-tools;12.0
        sdkmanager --version
        sdkmanager --install platform-tools platforms;android-35 build-tools;35.0.0
        apksigner --version
